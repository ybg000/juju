<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SYM—TYP V12 / 稳定版</title>
    <style>
        :root { 
            --fg: #231815; --bg: #ffffff; 
            --ui-font: 'Inter', -apple-system, system-ui, sans-serif;
            --sidebar-w: 320px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--ui-font); background: var(--bg); color: var(--fg); 
            display: grid; grid-template-columns: var(--sidebar-w) 1fr; 
            height: 100vh; overflow: hidden; 
        }
        
        /* 侧边栏 */
        .sidebar { border-right: 2px solid var(--fg); padding: 25px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; background: #fff; z-index: 10; }
        .label { font-size: 10px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--fg); padding-bottom: 5px; margin-top: 10px; }
        
        .symbol-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .symbol-item { 
            aspect-ratio: 1; border: 1px solid #eee; cursor: pointer; padding: 5px; 
            display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .symbol-item:hover { border-color: var(--fg); }
        .symbol-item.active { border: 2.5px solid var(--fg); background: #f5f5f5; }
        .symbol-item svg { width: 100%; height: 100%; pointer-events: none; }

        /* 工作区：锁定 1:1 正方形 */
        .workspace { background: #f4f4f4; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #grid { 
            background: #fff; display: grid; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); outline: 2px solid var(--fg);
            aspect-ratio: 1 / 1; 
            width: 85vmin; height: 85vmin;
            max-width: 800px; max-height: 800px;
        }

        .cell { border: 0.5px solid #f2f2f2; display: flex; align-items: center; justify-content: center; background: #fff; }
        .cell:hover { background: #fffcf0; }
        .cell svg { width: 90%; height: 90%; pointer-events: none; overflow: visible; }

        .btn { width: 100%; padding: 12px; background: #000; color: #fff; border: none; font-weight: 800; font-size: 10px; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        select { width: 100%; padding: 10px; border: 2px solid #000; font-weight: 700; margin-top: 5px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header"><h1 style="font-weight:900; font-size:18px;">SYM—TYP V12</h1></div>
        <div class="label">Symbol Library</div>
        <div class="symbol-grid" id="library">
            </div>
        <div class="label">Grid Resolution</div>
        <select id="grid-res">
            <option value="8">8 x 8</option>
            <option value="16" selected>16 x 16</option>
            <option value="32">32 x 32</option>
        </select>
        <div class="label">Export</div>
        <button class="btn" onclick="exportSVG()">Download SVG</button>
        <button class="btn" style="background:#fff; color:#000; border:2px solid #000;" onclick="clearCanvas()">Clear All</button>
    </aside>

    <main class="workspace">
        <div id="grid"></div>
    </main>

    <script>
        // 定义 10 个有效符号的 ID
        const SYMBOL_IDS = ['s0','s1','s2','s3','s4','s5','s6','s7','s8','s9'];
        let state = { current: 's0', size: 16, data: {}, isDrawing: false };

        // 1. 初始化符号库 (不再需要测量，直接从 Defs 读)
        function initLibrary() {
            const lib = document.getElementById('library');
            SYMBOL_IDS.forEach(id => {
                const sym = document.getElementById(id);
                const vb = sym.getAttribute('viewBox');
                
                const item = document.createElement('div');
                item.className = `symbol-item ${id === state.current ? 'active' : ''}`;
                item.innerHTML = `<svg viewBox="${vb}">${sym.innerHTML}</svg>`;
                item.onclick = () => {
                    document.querySelectorAll('.symbol-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    state.current = id;
                };
                lib.appendChild(item);
            });

            // 橡皮擦
            const eraser = document.createElement('div');
            eraser.className = 'symbol-item';
            eraser.innerHTML = `<span style="font-size:12px; font-weight:900;">✕</span>`;
            eraser.onclick = () => {
                document.querySelectorAll('.symbol-item').forEach(el => el.classList.remove('active'));
                eraser.classList.add('active');
                state.current = null;
            };
            lib.appendChild(eraser);
        }

        // 2. 渲染网格
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
            
            for (let i = 0; i < state.size * state.size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const x = i % state.size; const y = Math.floor(i / state.size);
                const pos = `${x}-${y}`;

                if(state.data[pos]) {
                    const sym = document.getElementById(state.data[pos]);
                    cell.innerHTML = `<svg viewBox="${sym.getAttribute('viewBox')}">${sym.innerHTML}</svg>`;
                }

                cell.onmousedown = (e) => { e.preventDefault(); state.isDrawing = true; draw(cell, pos); };
                cell.onmouseenter = () => { if(state.isDrawing) draw(cell, pos); };
                grid.appendChild(cell);
            }
        }

        function draw(cell, pos) {
            if (!state.current) {
                delete state.data[pos];
                cell.innerHTML = '';
            } else {
                state.data[pos] = state.current;
                const sym = document.getElementById(state.current);
                cell.innerHTML = `<svg viewBox="${sym.getAttribute('viewBox')}">${sym.innerHTML}</svg>`;
            }
        }

        window.clearCanvas = () => { state.data = {}; renderGrid(); }

        document.getElementById('grid-res').onchange = (e) => {
            state.size = parseInt(e.target.value);
            state.data = {};
            renderGrid();
        };

        window.exportSVG = () => {
            const s = state.size;
            let defs = document.getElementById('master-defs').innerHTML;
            let content = '';
            for (let pos in state.data) {
                const [x, y] = pos.split('-').map(Number);
                content += `<use href="#${state.data[pos]}" x="${x*100}" y="${y*100}" width="100" height="100"/>`;
            }
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${s*100} ${s*100}"><defs>${defs}</defs><rect width="100%" height="100%" fill="white"/><g fill="#231815">${content}</g></svg>`;
            const blob = new Blob([svg], {type: 'image/svg+xml'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'typ-design.svg'; a.click();
        }

        window.onmouseup = () => state.isDrawing = false;
        
        // 启动逻辑
        initLibrary();
        renderGrid();
    </script>
</body>
</html>
